name: Repo Guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guard:
    # This job runs on a local self-hosted runner with intranet model access.
    # Keep untrusted forks and outsider-triggered issues/comments away from it.
    if: >
      github.actor != 'dependabot[bot]' &&
      (
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) ||
        (
          github.event_name == 'issues' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        ) ||
        (
          github.event_name == 'issue_comment' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: ./
        with:
          type: both
          provider: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          model: ${{ vars.LLM_MODEL || 'claude-opus-4-7-thinking' }}
          api-key: ${{ secrets.LLM_API_KEY }}
          base-url: ${{ vars.LLM_BASE_URL }}
          structured-output: ${{ vars.LLM_STRUCTURED_OUTPUT || 'off' }}
