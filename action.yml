name: "Repo Guard AI"
description: "AI-powered review bot for GitHub Issues and Pull Requests. Supports OpenAI and Anthropic APIs with custom relay/proxy."
branding:
  icon: "shield"
  color: "blue"

inputs:
  type:
    description: "Review type: 'pr', 'issue', or 'both' (auto-detect from event)"
    required: false
    default: "both"
  provider:
    description: "LLM provider: 'openai' or 'anthropic'"
    required: false
    default: "openai"
  model:
    description: "Model name (e.g., gpt-4o, claude-sonnet-4-20250514)"
    required: false
    default: "gpt-4o"
  api-key:
    description: "API key for the LLM provider"
    required: true
  base-url:
    description: "Custom API base URL for relay/proxy service"
    required: false
    default: ""
  structured-output:
    description: "OpenRouter structured output mode: 'off' or 'auto'"
    required: false
    default: "auto"
  github-token:
    description: "GitHub token for posting comments"
    required: false
    default: ${{ github.token }}
  extra-instructions:
    description: "Additional instructions appended to the system prompt"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Initialize skills submodule
      shell: bash
      run: |
        SKILLS_DIR="${{ github.action_path }}/skills"
        if [ ! -d "$SKILLS_DIR/code-reviewer" ]; then
          rm -rf "$SKILLS_DIR"
          git clone --depth 1 https://github.com/ceilf6/ceilf6-skills.git "$SKILLS_DIR"
        fi
    - name: Run review
      shell: bash
      env:
        REVIEW_TYPE: ${{ inputs.type }}
        LLM_PROVIDER: ${{ inputs.provider }}
        LLM_MODEL: ${{ inputs.model }}
        LLM_API_KEY: ${{ inputs.api-key }}
        LLM_BASE_URL: ${{ inputs.base-url }}
        LLM_STRUCTURED_OUTPUT: ${{ inputs.structured-output }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        EXTRA_INSTRUCTIONS: ${{ inputs.extra-instructions }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        REPO_FULL_NAME: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_ACTION: ${{ github.event.action }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        COMMENT_USER: ${{ github.event.comment.user.login }}
        IS_PULL_REQUEST: ${{ github.event.issue.pull_request && 'true' || 'false' }}
      run: node "${{ github.action_path }}/scripts/review.mjs"
